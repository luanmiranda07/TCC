{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SyncFlow</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}" />
</head>
<body>
  <div class="page-wrapper">
    <div class="login-container">

      <section class="login-left">
        <div class="overlay"></div>
        <div class="brand-content">
          <img src="{% static 'img/syncflow.png' %}" alt="Logo SyncFlow" class="brand-logo" />
          <h1>SyncFlow</h1>
          <p>
            Sua plataforma inteligente para gestão, automação e controle com mais eficiência.
          </p>
        </div>
      </section>

      <section class="login-right">
        <div class="form-box">
          <span class="tag">Bem-vindo</span>
          <h2>Entrar na plataforma</h2>
          <p class="subtitle">Acesse sua conta para continuar</p>

          <form class="login-form" method="post">
            {% csrf_token %}

            <div class="input-group">
              <label for="email">E-mail</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Digite seu e-mail"
                required
              />
            </div>

            <div class="input-group">
              <label for="senha">Senha</label>
              <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                required
              />
            </div>

            <div class="form-options">
              <label class="remember">
                <input type="checkbox" name="remember" />
                <span>Lembrar acesso</span>
              </label>

              <a href="#" class="forgot-password">Esqueci minha senha</a>
            </div>

            <button type="submit" class="login-btn">Entrar</button>
          </form>
        </div>
      </section>

    </div>
  </div>
</body>
</html>
